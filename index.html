<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jose Joaquín Morales — Portafolio</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      max-width: 600px;
      margin: 100px auto;
      padding: 0 24px;
      line-height: 1.8;
      letter-spacing: 1px;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 0;
    }
    .subtitulo {
      color: #6a6a6a;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 8px;
    }
    .seccion {
      margin-top: 48px;
      font-size: 0.95rem;
      color: #b0b0b0;
    }
    .linea {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 40px 0;
    }
    .enlaces {
      margin-top: 48px;
    }
    .enlaces a {
      color: #6a6a6a;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .enlaces a:hover {
      color: #e0e0e0;
    }
  </style>
</head>
<body>
  <h1>Jose Joaquín Morales</h1>
  <p class="subtitulo">Diseño industrial · Modelado · Audiovisual</p>

  <hr class="linea">

  <div class="seccion">
    Diseñador industrial. Trabajo el modelado y lo audiovisual
    por pasión, moviéndome siempre por la experimentación.
    Hago cosas experimentales.
  </div>

  <div class="enlaces">
    <a href="https://youtube.com/@jothric" target="_blank">▸ YouTube</a>
  </div>
</body>
</html>
